  <path d="M70 166 108 82h18l38 84h-22l-7-17H99l-7 17H70Zm36-36h22l-11-27-11 27Z" fill="url(#aether)" filter="url(#glow)"/>
  <path d="M150 102V82h68v20h-24v64h-20v-64h-24Z" fill="#f9fbff" filter="url(#glow)"/>
