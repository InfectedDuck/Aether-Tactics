<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Aether Tactics logo</title>
  <desc id="desc">A luminous AT monogram over a tactical board diamond.</desc>
  <defs>
    <linearGradient id="bg" x1="32" y1="24" x2="220" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#172339"/>
      <stop offset="0.54" stop-color="#0a0d18"/>
      <stop offset="1" stop-color="#27133f"/>
    </linearGradient>
    <linearGradient id="aether" x1="54" y1="44" x2="202" y2="214" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7df7ff"/>
